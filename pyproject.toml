build-flashcards = "src.sw_docsmith.build_flashcards:build_flashcards"
build-business-card = "src.sw_docsmith.build_business_card:build_business_card"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
